<main>
  <section>
    <h1>🕵️ Recrutamento de Agentes</h1>
    <p>Isira os dados do recruta para análise de sua exposição paranomal.</p>
    
    <form id="form">
      <input type="text" id="nome" placeholder="Nome Completo" required>
      <input type="email" id="email" placeholder="E-mail oficial" required>
      
      <input type="text" id="cpf" placeholder="CPF (apenas 11 números)" maxlength="11" required>
      
      <input type="number" id="idade" placeholder="Idade" required>
      
      <button type="submit">CADASTRAR NA BASE</button>
    </form>
    
    <p id="msg" style="margin-top: 15px; font-weight: bold;"></p>
<h2>📋 Lista de Agentes</h2>
  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>CPF</th>
        <th>Idade</th>
        <th>Ação</th> </tr>
    </thead>
    <tbody id="tabelaAgentes">
      </tbody>
  </table>
  
  <br>
  <button onclick="limparTudo()">APAGAR TODA A BASE</button>
</section>

<script src="JAvaScrip.js"></script>

</body>
</html>
