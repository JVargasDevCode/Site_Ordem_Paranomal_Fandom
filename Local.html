<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Local do Caso - Ordem</title>
  <link rel="stylesheet" href="CSS_Paranomal.css"> </head>
<body>

<nav>
  <a href="cadastro.html">Cadastro</a>
  <a href="Local.html">CEP</a>
  <a href="Site_da_Ordem.html">Acesso</a>
  <a href="Sobre_Trabalho.html">Sobre</a>
</nav>

<main>
  <section>
    <h1>📍 Localização do Caso</h1>
    <p>Insira o CEP para identificar a origem da manifestação paranormal.</p>
    
    <input type="text" id="cep" placeholder="Digite o CEP (apenas números)" maxlength="8">

    <div id="resultado" style="margin-top: 20px;">
      <p id="rua"></p>
      <p id="bairro"></p>
      <p id="cidade"></p>
      <p id="estado"></p>
    </div>
  </section>
</main>

<script>
document.getElementById("cep").addEventListener("blur", function(){
  let cep = this.value.replace(/\D/g, ''); // Remove traços ou espaços

  if (cep.length !== 8) {
    alert("CEP deve ter 8 dígitos.");
    return;
  }

  fetch(`https://viacep.com.br/ws/${cep}/json/`)
    .then(res => res.json())
    .then(dados => {
      if(dados.erro){
        alert("CEP não encontrado na base de dados da Ordem!");
        return;
      }

      document.getElementById("rua").innerText = "Rua: " + (dados.logradouro || "N/A");
      document.getElementById("bairro").innerText = "Bairro: " + (dados.bairro || "N/A");
      document.getElementById("cidade").innerText = "Cidade: " + (dados.localidade || "N/A");
      document.getElementById("estado").innerText = "Estado: " + (dados.uf || "N/A");
    })
    .catch(err => {
      console.error("Erro na busca:", err);
      alert("Erro ao conectar com o sistema de rastreamento.");
    });
});
</script>

</body>
</html>
